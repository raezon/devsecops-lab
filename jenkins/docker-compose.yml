version: '3.8'

services:

  # -----------------------------------------------------------
  #  DOCKER-IN-DOCKER
  # -----------------------------------------------------------
  dind:
    image: docker:26-dind
    container_name: jenkins_dind
    hostname: dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind_storage:/var/lib/docker
    networks:
      devsecops-lab:
        aliases:
          - docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 20s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------
  #  JENKINS CONTROLLER
  # -----------------------------------------------------------
  jenkins:
    build:
      context: .
      dockerfile: dockerfile
    container_name: jenkins_master
    hostname: jenkins
    depends_on:
      dind:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.UpdateCenter.never=true
        -Dcasc.jenkins.config=/var/jenkins_home/casc
      DOCKER_HOST: tcp://dind:2375
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc:/var/jenkins_home/casc:ro
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d:ro
    networks:
      - devsecops-lab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # -----------------------------------------------------------
  #  JENKINS AGENT
  # -----------------------------------------------------------
  agent:
    image: jenkins/inbound-agent:latest-alpine
    container_name: jenkins_agent
    hostname: agent
    depends_on:
      jenkins:
        condition: service_healthy
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: docker-agent
      JENKINS_AGENT_WORKDIR: /home/jenkins/agent
      DOCKER_HOST: tcp://dind:2375
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - agent_workdir:/home/jenkins/agent
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops-lab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # -----------------------------------------------------------
  #  VOLUMES
  # -----------------------------------------------------------
volumes:
  jenkins_home:
    driver: local
  agent_workdir:
    driver: local
  dind_storage:
    driver: local

  # -----------------------------------------------------------
  #  NETWORKS
  # -----------------------------------------------------------
networks:
  devsecops-lab:
    driver: bridge
