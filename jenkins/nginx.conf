user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============ LOGGING ============
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    log_format jenkins_access '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time uct="$upstream_connect_time" '
                             'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ============ PERFORMANCE TUNING ============
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Connection optimization
    upstream jenkins_backend {
        least_conn;
        server jenkins:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============ HTTP TO HTTPS REDIRECT ============
    server {
        listen 80;
        server_name _;
        
        # Health check endpoint (no redirect)
        location /nginx_health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============ HTTPS SERVER ============
    server {
        listen 443 ssl http2;
        server_name jenkins.example.com _;

        # ============ SSL/TLS CONFIGURATION ============
        ssl_certificate /etc/nginx/ssl/certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/private.key;
        
        # Modern configuration - only TLS 1.2+ 
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # HSTS header (optional - uncomment to enable)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
        
        # Performance
        add_header Cache-Control "public, max-age=3600" always;

        # ============ LOGGING ============
        access_log /var/log/nginx/jenkins_access.log jenkins_access;
        error_log /var/log/nginx/jenkins_error.log warn;

        # ============ ROOT LOCATION ============
        location / {
            proxy_pass http://jenkins_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Host $host;
            
            # Jenkins specific headers
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 32 4k;
            proxy_busy_buffers_size 8k;
            proxy_max_temp_file_size 2048m;
            proxy_temp_file_write_size 32k;
            
            # Websocket support for Blue Ocean
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============ JENKINS API ENDPOINTS ============
        location ~ ^/(computer|job|api|queue|artifact|run|manage|cli|scriptText|jnlpJars) {
            proxy_pass http://jenkins_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # No buffering for large uploads
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # ============ STATIC FILES CACHING ============
        location ~ ^/(static|images|css|js|userContent) {
            proxy_pass http://jenkins_backend;
            
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Cache static files
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ============ WEBHOOK ENDPOINTS ============
        location ~ ^/(github-webhook|gitlab-webhook|bitbucket-webhook|generic-webhook-trigger) {
            proxy_pass http://jenkins_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============ HEALTH CHECK ============
        location /health {
            access_log off;
            proxy_pass http://jenkins_backend/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ============ METRICS ENDPOINT ============
        location /metrics {
            proxy_pass http://jenkins_backend/metrics;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            
            proxy_buffering off;
        }
    }

    # ============ UPSTREAM METRICS (OPTIONAL) ============
    server {
        listen 8081;
        server_name _;
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
        }
    }
}